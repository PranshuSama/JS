<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - Query Selector</title>
</head>
<body>
    <nav class = "block">
        <p class="paragraph">Welcome to my website</p>
    </nav>
    <div class="block">
        <h4>Hey There, My name is <span id="username">Pranshu</span> :) </h4>
        <p class="paragraph">Here is the code for you</p>
        <pre><code>console.log("Hey There")</code></pre>
    </div>

    <script>
        // query selector -> first element ko hi bs change krta hai.
        /*
            selectors
            - tag name
            - id #
            - class .
        */
       let code = document.querySelector('code')
       code.innerText = 'This is hacked!'

    </script>
</body>
</html>
