<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - Query Selector</title>
    <style>
        .red-color {
            color : red;
        }
        .underline {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class = "block">
        <p class="paragraph">Welcome to my website</p>
    </nav>
    <div class="block">
        <h4>Hey There, My name is <span id="username">Pranshu</span> :) </h4>
        <p class="paragraph">Here is the code for you</p>
        <pre><code>console.log("Hey There")</code></pre>
    </div>

    <div class="block">
        <h4>Hey There, My name is <span id="username">Pranshu</span> :) </h4>
        <p class="paragraph remove">Here is the code for you</p>
        <pre><code>console.log("Hey There")</code></pre>
    </div>
    <button id="ClickButton">Click Me</button>

    <script>
        const allChildren = document.querySelector("body").children;
        
        for(let i=0;i<allChildren.length;i++){
            allChildren[i].addEventListener("click", (event) =>{
                event.currentTarget.remove();
            });
        }

    </script>
</body>
</html>
